# Minimal bootstrap config. Day-to-day settings are managed in the web UI.
server:
  host: 0.0.0.0
  port: 8080

camera:
  backend: onvif
  device: rtsp
  width: 1280
  height: 720
  fps: 15
  flip: none
  # Provide either stream_url or host/user/password/path.
  stream_url: ""
  host: ""
  port: 554
  path: stream1
  username: ""
  password: ""

auth:
  enabled: true
  cookie_name: daygle_session

storage:
  database: data/daygle_ai_camera.sqlite3
