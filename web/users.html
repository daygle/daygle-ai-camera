<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Users - Daygle AI Camera</title>
  <link rel="icon" href="/favicon.ico" type="image/svg+xml" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="shell page-stack">
    <header class="hero">
      <div>
        <p class="eyebrow">Administration</p>
        <h1>User Management</h1>
        <p class="muted">Create users, change roles, disable accounts, and reset passwords.</p>
      </div>
    </header>

    <section class="card">
      <div class="settings-section-header">
        <div class="settings-section-icon">👥</div>
        <div>
          <h2>Users</h2>
          <p class="settings-section-subtitle">All registered accounts. Change roles, enable/disable, or reset passwords from here.</p>
        </div>
      </div>
      <div id="userMessage" class="muted"></div>
      <div id="users" class="list"></div>
    </section>

    <section class="card">
      <div class="settings-section-header">
        <div class="settings-section-icon">➕</div>
        <div>
          <h2>Create User</h2>
          <p class="settings-section-subtitle">Add a new account. The temporary password should be changed on first login.</p>
        </div>
      </div>
      <form id="createUserForm" class="form-grid">
        <label>
          <span>First Name</span>
          <input name="first_name" placeholder="First name" />
        </label>
        <label>
          <span>Last Name</span>
          <input name="last_name" placeholder="Last name" />
        </label>
        <label>
          <span>Email</span>
          <input name="email" type="email" placeholder="Email address" />
        </label>
        <label>
          <span>Username</span>
          <input name="username" placeholder="Username" required />
        </label>
        <label>
          <span>Role</span>
          <select name="role">
            <option value="viewer">Viewer</option>
            <option value="admin">Admin</option>
          </select>
          <span class="field-help">Viewers can view live feeds and recordings. Admins have full access. Default: Viewer</span>
        </label>
        <label>
          <span>Temporary Password</span>
          <input name="password" type="password" placeholder="Temporary password" required />
          <span class="field-help">The user should change this password after their first login.</span>
        </label>
      </form>
      <div class="button-row">
        <button type="submit" form="createUserForm">Create User</button>
      </div>
    </section>
  </main>
  <script src="/static/nav.js"></script>
  <script src="/static/utils.js"></script>
  <script src="/static/users.js"></script>
</body>
</html>
