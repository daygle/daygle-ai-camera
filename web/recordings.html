<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Recordings - Daygle AI Camera</title>
  <link rel="icon" href="/favicon.ico" type="image/svg+xml" />
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="/static/timeline.css" />
</head>
<body>
  <main class="shell page-stack recordings-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Recorded Clips</p>
        <h1>Recordings</h1>
        <p class="muted">Review captured clips, inspect trigger details, and manage recording files.</p>
      </div>
    </header>

    <section>
      <article class="card recordings-list-card">
        <div class="section-header">
          <h2>Clip Library</h2>
          <div class="button-row">
            <button id="deleteAllRecordingsBtn" class="secondary delete-btn" type="button" hidden>Delete All Recordings</button>
          </div>
        </div>
        <p id="listStatus" class="muted"></p>
        <div class="search-row recordings-search-row">
          <select id="cameraFilter" aria-label="Filter by camera">
            <option value="">All Cameras</option>
          </select>
          <input id="recordingFilter" placeholder="Filter clips by object label..." />
          <button id="recordingSearchBtn">Filter</button>
          <button id="recordingClearBtn" class="secondary">All</button>
        </div>
        <div id="recordings" class="list recordings-list"></div>
      </article>
    </section>
  </main>

  <div id="videoModal" class="video-modal" role="dialog" aria-modal="true" aria-label="Playback" hidden>
    <div class="video-modal-backdrop"></div>
    <div class="video-modal-content card">
      <div class="video-modal-header">
        <h2>Playback</h2>
        <button id="videoModalClose" class="secondary" type="button" aria-label="Close">✕</button>
      </div>
      <div class="clip-player-wrap">
        <video id="clipPlayer" controls preload="metadata"></video>
        <canvas id="clipOverlay" class="clip-overlay" aria-hidden="true"></canvas>
      </div>
      <div class="clip-overlay-controls">
        <label class="toggle-control clip-overlay-toggle" for="clipOverlayToggle">
          <input id="clipOverlayToggle" type="checkbox" checked />
          <span>Show event detection box</span>
        </label>
        <label class="toggle-control clip-overlay-toggle" for="clipOverlayTrackToggle">
          <input id="clipOverlayTrackToggle" type="checkbox" />
          <span>AI Track (per-frame)</span>
        </label>
      </div>
      <p class="muted clip-overlay-note">Enable AI Track for true frame-by-frame observation (higher CPU usage). When disabled, boxes are event snapshots only.</p>
      <p id="clipPlayerStatus" class="muted"></p>
      <div id="recordingDetails" class="status-panel"></div>
    </div>
  </div>

  <script src="/static/nav.js"></script>
  <script src="/static/recordings.js"></script>
</body>
</html>
