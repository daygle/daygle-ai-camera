<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Camera - Daygle AI Camera</title>
  <link rel="icon" href="/favicon.ico" type="image/svg+xml" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="shell live-shell" data-live-page="live">
    <section class="live-viewer-card">
      <header class="live-toolbar">
        <div>
          <p class="eyebrow">Live Cameras</p>
          <h1>Live Footage</h1>
          <p class="muted">Watch one camera or all cameras with matched object alert boxes overlaid on the footage.</p>
        </div>
        <div class="live-controls">
          <label>
            <span>View</span>
            <select id="viewModeSelect">
              <option value="single">One camera</option>
              <option value="all">All cameras</option>
            </select>
          </label>
          <label>
            <span>Camera</span>
            <select id="cameraSelect"></select>
          </label>
          <label class="toggle-control" for="liveAiTrackToggle" id="liveAiTrackLabel">
            <input id="liveAiTrackToggle" type="checkbox" />
            <span>Object overlay</span>
          </label>
        </div>
      </header>
      <div class="live-frame-wrap" id="liveFrameWrap">
        <img id="liveFrame" class="live-frame" alt="Live camera footage" />
        <canvas id="liveAiTrackCanvas" class="clip-overlay" aria-hidden="true"></canvas>
        <div id="liveStatus" class="live-status">Connecting to camera...</div>
      </div>
      <div id="cameraGrid" class="live-camera-grid" hidden></div>
      <div id="liveDetectionStatus" class="live-detection-status">Live AI status waiting for frames.</div>
    </section>
  </main>
  <script src="/static/nav.js"></script>
  <script src="/static/utils.js"></script>
  <script src="/static/overlay.js"></script>
  <script src="/static/live.js"></script>
</body>
</html>
