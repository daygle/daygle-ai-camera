<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile - Daygle AI Camera</title>
  <link rel="icon" href="/favicon.ico" type="image/svg+xml" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="shell page-stack">
    <header class="hero">
      <div>
        <p class="eyebrow">Account</p>
        <h1>Profile</h1>
        <p class="muted">Manage your display preferences and password.</p>
      </div>
    </header>

    <section class="card">
      <div class="settings-section-header">
        <div class="settings-section-icon">👤</div>
        <div>
          <h2>Profile Details</h2>
          <p class="settings-section-subtitle">Update your name, email, timezone, and date/time display preferences.</p>
        </div>
      </div>
      <div id="profileMessage" class="muted"></div>
      <div id="profileSummary" class="status-panel"></div>
      <form id="profileForm" class="form-grid">
        <label>
          <span>Username</span>
          <input name="username" placeholder="Username" required />
        </label>
        <label>
          <span>First Name</span>
          <input name="first_name" placeholder="First name" />
        </label>
        <label>
          <span>Last Name</span>
          <input name="last_name" placeholder="Last name" />
        </label>
        <label>
          <span>Email</span>
          <input name="email" type="email" placeholder="Email address" />
        </label>
        <label>
          <span>Timezone</span>
          <input name="timezone" placeholder="e.g. Australia/Sydney" required />
          <span class="field-help">Used for all timestamps in the app. Default: Australia/Sydney</span>
        </label>
        <label>
          <span>Date Format</span>
          <select name="date_format">
            <option value="locale">Browser Locale</option>
            <option value="iso">YYYY-MM-DD</option>
            <option value="au">DD/MM/YYYY</option>
            <option value="us">MM/DD/YYYY</option>
          </select>
          <span class="field-help">How dates are displayed throughout the app. Default: Browser Locale</span>
        </label>
        <label>
          <span>Time Format</span>
          <select name="time_format">
            <option value="24h">24 Hour</option>
            <option value="12h">12 Hour</option>
          </select>
          <span class="field-help">12-hour shows AM/PM, 24-hour uses military time. Default: 24 Hour</span>
        </label>
      </form>
      <div class="button-row">
        <button type="submit" form="profileForm">Save Profile</button>
      </div>
    </section>

    <section class="card">
      <div class="settings-section-header">
        <div class="settings-section-icon">🔑</div>
        <div>
          <h2>Change Password</h2>
          <p class="settings-section-subtitle">Update your account password. Choose a strong, unique password.</p>
        </div>
      </div>
      <form id="passwordForm" class="form-grid">
        <label>
          <span>Current Password</span>
          <input name="current_password" type="password" placeholder="Current password" autocomplete="current-password" required />
        </label>
        <label>
          <span>New Password</span>
          <input name="new_password" type="password" placeholder="New password" autocomplete="new-password" required />
          <span class="field-help">Use at least 8 characters with a mix of letters, numbers, and symbols.</span>
        </label>
        <label>
          <span>Confirm Password</span>
          <input name="confirm_password" type="password" placeholder="Confirm password" autocomplete="new-password" required />
        </label>
      </form>
      <div class="button-row">
        <button type="submit" form="passwordForm">Change Password</button>
      </div>
    </section>
  </main>
  <script src="/static/nav.js"></script>
  <script src="/static/utils.js"></script>
  <script src="/static/profile.js"></script>
</body>
</html>
