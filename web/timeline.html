<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Timeline - Daygle AI Camera</title>
  <link rel="icon" href="/favicon.ico" type="image/svg+xml" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="shell page-stack timeline-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Camera Playback</p>
        <h1>Timeline</h1>
        <p class="muted">Choose a camera and day, then click a coloured segment to open and play that clip.</p>
      </div>
    </header>

    <section class="recording-timeline-layout">
      <article class="card timeline-card">
        <div class="section-header">
          <h2>Daily timeline</h2>
          <p id="timelineStatus" class="muted">Loading timeline…</p>
        </div>
        <div class="timeline-controls">
          <label>
            <span>Camera</span>
            <select id="timelineCameraSelect"></select>
          </label>
          <label>
            <span>Day</span>
            <input id="timelineDate" type="date" />
          </label>
          <label>
            <span>From</span>
            <input id="timelineFromTime" type="time" value="00:00" />
          </label>
          <label>
            <span>To</span>
            <input id="timelineToTime" type="time" value="23:59" />
          </label>
          <label>
            <span>Filter</span>
            <select id="timelineFilterSelect">
              <option value="">All recordings</option>
            </select>
          </label>
          <button id="timelineLoadBtn" type="button">Load Timeline</button>
        </div>
        <div id="timelineSummary" class="status-panel timeline-summary"></div>
        <div id="timelineLegend" class="timeline-legend"></div>
        <div class="timeline-scroll">
          <div id="timelineHours" class="timeline-hours"></div>
          <div id="timelineTrack" class="timeline-track">
            <div id="timelineGrid" class="timeline-grid" aria-hidden="true"></div>
            <div id="timelineRows" class="timeline-rows"></div>
          </div>
        </div>
        <div id="timelineRecordings" class="list timeline-recordings"></div>
      </article>
    </section>
  </main>

  <div id="videoModal" class="video-modal" role="dialog" aria-modal="true" aria-label="Playback" hidden>
    <div class="video-modal-backdrop"></div>
    <div class="video-modal-content card">
      <div class="video-modal-header">
        <h2>Playback</h2>
        <div class="button-row">
          <a id="videoModalDownload" class="secondary" download hidden>Download</a>
          <button id="videoModalClose" class="secondary" type="button" aria-label="Close">✕</button>
        </div>
      </div>
      <div class="clip-player-wrap">
        <video id="clipPlayer" controls preload="metadata"></video>
        <canvas id="clipOverlay" class="clip-overlay" aria-hidden="true"></canvas>
      </div>
      <div class="clip-overlay-controls">
        <label class="toggle-control clip-overlay-toggle" for="clipOverlayToggle">
          <input id="clipOverlayToggle" type="checkbox" checked />
          <span>Object Overlay</span>
        </label>
      </div>
      <p class="muted clip-overlay-note">Boxes replay the detections captured live while the clip recorded. Recordings without a saved track show the event's static boxes.</p>
      <p id="clipPlayerStatus" class="muted"></p>
      <div id="recordingDetails" class="status-panel"></div>
    </div>
  </div>

  <script src="/static/nav.js"></script>
  <script src="/static/utils.js"></script>
  <script src="/static/overlay.js"></script>
  <script src="/static/timeline.js"></script>
</body>
</html>
