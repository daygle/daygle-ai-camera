<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Settings - Daygle AI Camera</title>
  <link rel="icon" href="/favicon.ico" type="image/svg+xml" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="shell page-stack">
    <header class="hero">
      <div>
        <p class="eyebrow">Administration</p>
        <h1>AI Settings</h1>
        <p class="muted">Configure AI detection, install models, and reload the detector.</p>
      </div>
    </header>

    <section class="card">
      <div class="section-header">
        <div>
          <h2>AI Status</h2>
        </div>
        <div class="button-row">
          <button id="checkModelBtn" class="secondary" type="button">Check Model</button>
          <button id="downloadModelBtn" type="button">Download YOLOv8n ONNX</button>
          <button id="reloadDetectorBtn" class="secondary" type="button">Reload Detector</button>
          <button id="testDetectorBtn" class="secondary" type="button">Test Detector</button>
        </div>
      </div>
      <div id="settingsMessage" class="muted"></div>
      <div id="aiStatusPanel" class="status-panel"></div>
    </section>

    <section class="card">
      <h2>Settings</h2>
      <form id="aiSettingsForm" class="form-grid">
        <label>
          <span>AI Enabled</span>
          <select name="enabled">
            <option value="true">Enabled</option>
            <option value="false">Disabled</option>
          </select>
        </label>
        <label>
          <span>Backend</span>
          <select name="backend">
            <option value="onnx">ONNX</option>
          </select>
        </label>
        <label>
          <span>IoU Threshold</span>
          <input name="iou_threshold" type="number" min="0" max="1" step="0.01" />
        </label>
        <label>
          <span>Input Size</span>
          <input name="input_size" type="number" min="32" max="2048" step="32" />
        </label>
        <label>
          <span>Model Path</span>
          <input name="model_path" />
        </label>
        <label>
          <span>Labels Path</span>
          <input name="labels_path" />
        </label>
        <button type="submit">Save AI Settings</button>
      </form>
    </section>
  </main>
  <script src="/static/nav.js"></script>
  <script src="/static/ai.js"></script>
</body>
</html>
